services:
  oc-facturer:
    build: .
    container_name: oc-facturer
    env_file: .env.prod
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - traefik-network

networks:
  traefik-network:
    external: true
